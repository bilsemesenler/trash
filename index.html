<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doğanın Koruyucuları | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <section id="welcome-screen" class="screen bg-gradient">
        <div class="hero-content">
            <div class="icon-box">🌍</div>
            <h1>Doğanın <br><span>Koruyucuları</span></h1>
            <p>Atıkları tara, geleceği kurtar!</p>
            <button id="start-btn" class="main-btn">BAŞLAT</button>
        </div>
    </section>

    <!-- KAMERA EKRANI -->
    <section id="camera-screen" class="screen hidden">
        <div id="webcam-wrapper">
            <div id="webcam-container"></div>
            
            <!-- Kamera Üstü Panel (Overlay) -->
            <div id="overlay-panel" class="hidden">
                <div class="detected-info">
                    <span id="waste-icon">♻️</span>
                    <h2 id="waste-name">Tespit Edildi!</h2>
                </div>
                <div class="action-buttons">
                    <button id="confirm-btn" class="btn-check">Kutuya Attım ✅</button>
                    <button id="retry-btn" class="btn-skip">Pas Geç 🔄</button>
                </div>
            </div>
        </div>
    </section>

    <!-- BAŞARI EKRANI -->
    <section id="success-screen" class="screen hidden bg-success">
        <div class="success-content">
            <div class="medal">🏅</div>
            <h2>Harika İş!</h2>
            <p>Doğayı bir atıktan daha kurtardın.</p>
            <button id="restart-btn" class="main-btn">YENİ ATIK</button>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
