<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doğanın Koruyucuları</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="welcome-screen" class="screen">
        <div class="content">
            <h1>Doğanın Koruyucuları</h1>
            <div class="hero-image">
                🌱♻️🌍
            </div>
            <p>Atıkları doğru kutulara atarak dünyamızı kurtarmaya hazır mısın?</p>
            <button id="start-btn">BAŞLA</button>
        </div>
    </section>

    <section id="camera-screen" class="screen hidden">
        <div id="webcam-container"></div>
        <div id="label-container">Analiz ediliyor...</div>
        
        <div id="result-popup" class="modal hidden">
            <div class="modal-content">
                <h2 id="waste-name">Atık Türü</h2>
                <p id="waste-instruction">Lütfen uygun kutuya atın.</p>
                <button id="action-btn">Kutuya Attım!</button>
            </div>
        </div>
    </section>

    <section id="success-screen" class="screen hidden">
        <div class="content">
            <h2>Tebrikler!</h2>
            <p>Doğanın Koruyucularına katıldığın için teşekkür ederiz.</p>
            <div class="badge">🏅</div>
            <button id="restart-btn">YENİ ATIK TARA</button>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
