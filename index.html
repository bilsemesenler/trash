<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doğanın Koruyucuları | Yusuf</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. EKRAN: KARŞILAMA -->
    <section id="welcome-screen" class="screen main-bg">
        <div class="content animate-fade">
            <div class="logo-area">♻️</div>
            <h1>Doğanın <br><span>Koruyucuları</span></h1>
            <p>Atığını kameraya göster, dünyayı kurtarmaya hemen başla!</p>
            <button id="start-btn" class="glow-btn">MACERAYA BAŞLA</button>
        </div>
    </section>

    <!-- 2. EKRAN: KAMERA VE ANALİZ -->
    <section id="camera-screen" class="screen hidden">
        <div id="scan-wrapper">
            <div id="webcam-container"></div>
            <div class="scan-bar"></div>
        </div>

        <!-- Tespit Sonuç Paneli -->
        <div id="result-panel" class="hidden">
            <div class="result-card">
                <div id="waste-emoji">❓</div>
                <h2 id="waste-name">Analiz Ediliyor...</h2>
                <p id="waste-instruction">Lütfen bekleyin...</p>
                
                <div class="action-group">
                    <button id="confirm-btn" class="btn-success">Kutuya Attım ✅</button>
                    <button id="retry-btn" class="btn-retry">Tekrar Tara 🔄</button>
                </div>
            </div>
        </div>
        
        <div id="status-label" class="pulse">Atık Aranıyor...</div>
    </section>

    <!-- 3. EKRAN: TEBRİKLER -->
    <section id="success-screen" class="screen hidden success-bg">
        <div class="content animate-pop">
            <div class="badge-anim">🏆</div>
            <h2>Harikasın!</h2>
            <p>Doğanın korunmasına katkıda bulundun. <br>Sen gerçek bir kahramansın!</p>
            <button id="restart-btn" class="glow-btn">YENİ ATIK TARA</button>
        </div>
    </section>

    <!-- TensorFlow & Teachable Machine Kütüphaneleri -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
