
<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>
</head>
<body>
  <video id="webcam" autoplay playsinline width="300" height="300"></video>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/nDI_BwbHN/";
    let model, webcam;

    async function init() {
      model = await tmImage.load(URL + "model.json", URL + "metadata.json");

      webcam = new tmImage.Webcam(300, 300, true);
      await webcam.setup();
      await webcam.play();
      window.requestAnimationFrame(loop);

      document.getElementById("webcam").srcObject = webcam.webcam;
    }

    async function loop() {
      webcam.update();
      const prediction = await model.predict(webcam.canvas);

      let best = prediction[0];
      for (let i = 1; i < prediction.length; i++) {
        if (prediction[i].probability > best.probability) {
          best = prediction[i];
        }
      }

      // App Inventor'a gönder
      if (window.AppInventor) {
        window.AppInventor.setWebViewString(
          best.className + ":" + best.probability
        );
      }

      window.requestAnimationFrame(loop);
    }

    init();
  </script>
</body>
</html>
